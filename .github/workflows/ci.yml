name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Job 1: Lint & Test ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are critical syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as non-blocking (exit-zero) — line length relaxed to 120
          flake8 . --count --exit-zero --max-line-length=120 --statistics

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: fake
        run: |
          python -m pytest tests/ -v --tb=short

  # ---- Job 2: Docker Build ----
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test  # Only build Docker if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t attendance-system:test .
